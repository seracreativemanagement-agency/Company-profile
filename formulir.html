<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Consultation Form</title>\n</head>\n<body>\n    <h1>Consultation Form</h1>\n    <form action="#" method="POST">\n        <label for="nama">Nama:</label><br>\n        <input type="text" id="nama" name="nama" required><br><br>\n        <label for="nama_usaha">Nama Usaha:</label><br>\n        <input type="text" id="nama_usaha" name="nama_usaha" required><br><br>\n        <label for="alamat_usaha">Alamat Usaha:</label><br>\n        <input type="text" id="alamat_usaha" name="alamat_usaha" required><br><br>\n        <label for="jenis_usaha">Jenis Usaha:</label><br>\n        <select id="jenis_usaha" name="jenis_usaha">\n            <option value="retail">Retail</option>\n            <option value="service">Service</option>\n            <option value="manufacturing">Manufacturing</option>\n            <option value="online">Online</option>\n        </select><br><br>\n        <label for="consultant">Consultant:</label><br>\n        <select id="consultant" name="consultant" required>\n            <option value="consultant1">Consultant 1</option>\n            <option value="consultant2">Consultant 2</option>\n            <option value="consultant3">Consultant 3</option>\n        </select><br><br>\n        <label for="no_hp">No HP:</label><br>\n        <input type="text" id="no_hp" name="no_hp" required><br><br>\n        <label for="email">Email:</label><br>\n        <input type="email" id="email" name="email" required><br><br>\n        <label for="pesan">Pesan:</label><br>\n        <textarea id="pesan" name="pesan" required></textarea><br><br>\n        <input type="submit" value="Submit">\n    </form>\n</body>\n</html>
